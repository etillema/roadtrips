title: Roadtrips
description: "Campings, fietstochten, wandelroutes, kano- en suproutes, mooie plaatsen en musea"
baseurl: ""
url: ""
lang: nl
favicon: "/assets/images/favicon.ico"

theme: beautiful-jekyll-theme

# Custom CSS
site-css:
  - "/assets/css/main.css"

# Navigation menu
navbar-links:
  "Campings": "/"
  "Fietstochten": "/fietstochten/"
  "Wandelroutes": "/wandelroutes/"
  "Plaatsen": "/plaats/"
  "Musea": "/musea/"
  "Kano & SUP": "/kano-suproutes/"

# Build settings
markdown: kramdown
encoding: utf-8

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

# Collecties
collections:
  campings:
    output: true
    permalink: /campings/:slug/
  fietstochten:
    output: true
    permalink: /fietstochten/:slug/
  wandelroutes:
    output: true
    permalink: /wandelroutes/:slug/
  plaats:
    output: true
    permalink: /plaats/:slug/
  musea:
    output: true
    permalink: /musea/:slug/
  kano_suproutes:
    output: true
    permalink: /kano-suproutes/:slug/

# Front matter defaults per collectie
defaults:
  - scope:
      path: ""
      type: "campings"
    values:
      layout: "camping"
      categorie: "campings"
  - scope:
      path: ""
      type: "fietstochten"
    values:
      layout: "item"
      categorie: "fietstochten"
  - scope:
      path: ""
      type: "wandelroutes"
    values:
      layout: "item"
      categorie: "wandelroutes"
  - scope:
      path: ""
      type: "plaats"
    values:
      layout: "place"
      categorie: "plaats"
  - scope:
      path: ""
      type: "musea"
    values:
      layout: "item"
      categorie: "musea"
  - scope:
      path: ""
      type: "kano_suproutes"
    values:
      layout: "item"
      categorie: "kano_suproutes"
