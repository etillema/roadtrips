<div class="filter-card">
  <h3 class="filter-title">Filter routes</h3>

  <div class="filter-group">
    <label class="filter-label">Afstand</label>
    <input type="range" class="filter-range" min="0" max="100" value="50" />
    <div class="range-values">
      <span>0 km</span>
      <span>100+ km</span>
    </div>
  </div>

  <div class="filter-group">
    <label class="filter-label">Type route</label>
    <div class="filter-options">
      <label class="filter-checkbox">
        <input type="checkbox" />
        <span>Rondroute</span>
      </label>
      <label class="filter-checkbox">
        <input type="checkbox" />
        <span>A-naar-B</span>
      </label>
      <label class="filter-checkbox">
        <input type="checkbox" />
        <span>Beginner</span>
      </label>
    </div>
  </div>

  <div class="filter-group">
    <label class="filter-label">Moeilijkheid</label>
    <div class="filter-options">
      <label class="filter-checkbox">
        <input type="checkbox" />
        <span>Makkelijk</span>
      </label>
      <label class="filter-checkbox">
        <input type="checkbox" />
        <span>Gemiddeld</span>
      </label>
      <label class="filter-checkbox">
        <input type="checkbox" />
        <span>Zwaar</span>
      </label>
    </div>
  </div>

  <div class="filter-group">
    <label class="filter-label">Regio</label>
    <select class="filter-select">
      <option>Alle regio's</option>
      <option>Noord</option>
      <option>Oost</option>
      <option>West</option>
      <option>Zuid</option>
    </select>
  </div>

  <button class="filter-reset">Filters opnieuw instellen</button>
</div>
