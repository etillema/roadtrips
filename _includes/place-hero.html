<section class="place-hero">
  <div class="place-hero__panel">
    <a href="/plaats/" class="breadcrumb">← Terug naar alle plaatsen</a>

    {% if page.type or page.locatie.gebied %}
      <div class="place-badges">
        {% if page.type %}<span class="badge">{{ page.type | capitalize }}</span>{% endif %}
        {% if page.locatie.gebied %}<span class="badge">{{ page.locatie.gebied }}</span>{% endif %}
      </div>
    {% endif %}
  </div>

  {% if page.foto %}
    <div class="place-hero__image">
      <img src="{{ page.foto }}" alt="{{ page.title }}" />
    </div>
  {% endif %}
</section>
