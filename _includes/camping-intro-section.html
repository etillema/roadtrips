<section class="intro-section">
  <div class="intro-content">
    <h2>Over de camping</h2>
    {% if page.beschrijving %}
      <p class="intro-text">{{ page.beschrijving }}</p>
    {% endif %}
    {% if page.omschrijving_sfeer %}
      <div class="sfeer-content">
        {{ page.omschrijving_sfeer | markdownify }}
      </div>
    {% endif %}

    {% if page.website %}
      <p><a href="{{ page.website }}" target="_blank" rel="noopener" class="text-link">Bezoek de website →</a></p>
    {% endif %}
  </div>
</section>
