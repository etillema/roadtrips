<section class="home-hero page-shell">
  <div class="home-hero__panel">
    <div class="home-hero__image-wrap">
      <img src="/assets/images/weserbergland/IMG_1739-weserbergland-640x480.webp" alt="Weserbergland in Duitsland" class="home-hero__image" loading="lazy" />
      <p class="hero-image-caption"><a href="/campings/">Weserbergland – camping Weserterrassen</a></p>
    </div>

    <div class="home-hero__content">
      <h1>Roadtrips</h1>
      <div class="title-accent"></div>
      <h2>Fietsen, wandelen & kamperen in Noord-West Europa</h2>
      <p>Ontdek je volgende avontuur met onze verzameling mooie routes, campings, plaatsen en musea.</p>

      <div class="search-container">
        <!-- SEARCH & FILTERS -->
        <div class="search-section">
          <input
            type="text"
            class="search-input"
            placeholder="Zoek op naam, plaats, regio, activiteit..."
            id="searchInput"
          />
          <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
          <div class="active-tags" id="activeTags"></div>
        </div>

        <div class="filters-bar">
          <div class="filter-wrapper">
            <label for="filterLand">Land:</label>
            <select id="filterLand">
              <option value="">Alle landen</option>
            </select>
          </div>

          <div class="filter-wrapper">
            <label for="filterGebied">Gebied:</label>
            <select id="filterGebied">
              <option value="">Alle gebieden</option>
            </select>
          </div>

          <div class="filter-wrapper">
            <label for="filterType">Type:</label>
            <select id="filterType">
              <option value="">Alle types</option>
            </select>
          </div>

          <button class="filter-reset-btn" id="resetFilters">Filters wissen</button>
        </div>

        <!-- RESULTS -->
        <div class="results-container">
          <div class="results-header" id="resultsHeader"></div>
          <div class="search-results" id="searchResults"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
class FilteredSearch {
  constructor() {
    this.allItems = [];
    this.filteredItems = [];
    this.suggestions = [];
    this.selectedTags = [];

    // Get DOM elements
    this.searchInput = document.getElementById('searchInput');
    this.filterLand = document.getElementById('filterLand');
    this.filterGebied = document.getElementById('filterGebied');
    this.filterType = document.getElementById('filterType');
    this.resultsContainer = document.getElementById('searchResults');
    this.resultsHeader = document.getElementById('resultsHeader');
    this.resetButton = document.getElementById('resetFilters');
    this.suggestionsDropdown = document.getElementById('suggestionsDropdown');
    this.activeTagsContainer = document.getElementById('activeTags');

    if (this.searchInput) {
      this.init();
    }
  }

  async init() {
    await this.loadData();
    this.populateSelects();
    this.attachListeners();
    this.updateResults();
  }

  async loadData() {
    try {
      const response = await fetch('/assets/data/search-index.json');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      this.allItems = await response.json();
    } catch (error) {
      console.error('Error loading search data:', error);
      this.allItems = [];
    }
  }

  populateSelects() {
    // Populate Land (Landen)
    const lands = [...new Set(this.allItems.map(i => i.land))].sort();
    lands.forEach(land => {
      const opt = document.createElement('option');
      opt.value = land;
      opt.textContent = land;
      this.filterLand.appendChild(opt);
    });

    // Populate Type
    const types = {
      'camping': 'Campings',
      'fietstocht': 'Fietstochten',
      'wandelroute': 'Wandelroutes',
      'kano-sup': 'Kano & SUP',
      'plaats': 'Plaatsen',
      'museum': 'Musea'
    };
    Object.entries(types).forEach(([key, label]) => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = label;
      this.filterType.appendChild(opt);
    });

    // Initialize Gebied with all areas
    this.updateGebieden();
  }

  updateGebieden() {
    const selectedLand = this.filterLand.value;
    const gebieden = new Set();

    this.allItems.forEach(item => {
      if (!selectedLand || item.land === selectedLand) {
        const gebied = item.gebied || item.regio;
        if (gebied) gebieden.add(gebied);
      }
    });

    this.filterGebied.innerHTML = '<option value="">Alle gebieden</option>';
    [...gebieden].sort().forEach(gebied => {
      const opt = document.createElement('option');
      opt.value = gebied;
      opt.textContent = gebied;
      this.filterGebied.appendChild(opt);
    });
  }

  attachListeners() {
    this.searchInput.addEventListener('input', () => {
      this.updateSuggestions();
      this.updateResults();
    });
    this.searchInput.addEventListener('blur', () => {
      setTimeout(() => this.suggestionsDropdown.classList.remove('active'), 200);
    });
    this.searchInput.addEventListener('focus', () => {
      if (this.suggestions.length > 0) {
        this.suggestionsDropdown.classList.add('active');
      }
    });
    this.filterLand.addEventListener('change', () => {
      this.updateGebieden();
      this.updateResults();
    });
    this.filterGebied.addEventListener('change', () => this.updateResults());
    this.filterType.addEventListener('change', () => this.updateResults());
    this.resetButton.addEventListener('click', () => this.reset());
  }

  updateSuggestions() {
    const query = this.searchInput.value.toLowerCase().trim();

    if (!query) {
      this.suggestions = [];
      this.renderSuggestions();
      return;
    }

    // Collect tags: item-namen + velden (gebieden, regio's, landen, types)
    const tagMap = new Map();
    const selectedTagKeys = new Set(this.selectedTags.map(t => `${t.type}:${t.value}`));

    this.allItems.forEach(item => {
      // Item naam
      if (item.naam.toLowerCase().includes(query)) {
        const key = `naam:${item.naam}`;
        if (!tagMap.has(key) && !selectedTagKeys.has(key)) {
          tagMap.set(key, {
            value: item.naam,
            type: 'naam',
            label: this.getTypeLabel(item.type)
          });
        }
      }

      // Velden: regio, gebied, land, type
      const fields = [
        { value: item.regio, type: 'regio', label: 'Regio' },
        { value: item.gebied, type: 'gebied', label: 'Gebied' },
        { value: item.land, type: 'land', label: 'Land' },
        { value: item.type, type: 'type', label: this.getTypeLabel(item.type) }
      ];

      fields.forEach(field => {
        if (field.value && field.value.toLowerCase().includes(query)) {
          const key = `${field.type}:${field.value}`;
          if (!tagMap.has(key) && !selectedTagKeys.has(key)) {
            tagMap.set(key, {
              value: field.value,
              type: field.type,
              label: field.label
            });
          }
        }
      });
    });

    // Convert to array and sort by type, then limit to 10
    this.suggestions = Array.from(tagMap.values())
      .sort((a, b) => {
        const typeOrder = { 'naam': 0, 'plaats': 0.5, 'regio': 1, 'gebied': 2, 'land': 3, 'type': 4 };
        return (typeOrder[a.type] || 5) - (typeOrder[b.type] || 5);
      })
      .slice(0, 10);

    this.renderSuggestions();
  }

  getTypeLabel(type) {
    const typeLabels = {
      'camping': 'Campings',
      'fietstocht': 'Fietstochten',
      'wandelroute': 'Wandelroutes',
      'kano-sup': 'Kano & SUP',
      'plaats': 'Plaatsen',
      'museum': 'Musea'
    };
    return typeLabels[type] || type;
  }

  renderSuggestions() {
    if (this.suggestions.length === 0) {
      this.suggestionsDropdown.classList.remove('active');
      this.suggestionsDropdown.innerHTML = '';
      return;
    }

    const html = this.suggestions.map((tag, idx) => `
      <div class="suggestion-item" data-index="${idx}">
        <div class="suggestion-item__content">
          <div class="suggestion-item__text">
            <div class="suggestion-item__name">${tag.value}</div>
            <div class="suggestion-item__type">${tag.label}</div>
          </div>
        </div>
      </div>
    `).join('');

    this.suggestionsDropdown.innerHTML = html;
    this.suggestionsDropdown.classList.add('active');

    // Add click listeners to suggestions
    this.suggestionsDropdown.querySelectorAll('.suggestion-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.getAttribute('data-index'));
        const tag = this.suggestions[idx];
        this.selectedTags.push(tag);
        this.searchInput.value = '';
        this.renderActiveTags();
        this.updateSuggestions();
        this.updateResults();
        this.searchInput.focus();
      });
    });
  }

  renderActiveTags() {
    if (this.selectedTags.length === 0) {
      this.activeTagsContainer.innerHTML = '';
      return;
    }

    const html = this.selectedTags.map((tag, idx) => `
      <div class="tag-chip">
        <span class="tag-chip__label">${tag.value}</span>
        <button class="tag-chip__remove" data-index="${idx}" type="button">×</button>
      </div>
    `).join('');

    this.activeTagsContainer.innerHTML = html;

    this.activeTagsContainer.querySelectorAll('.tag-chip__remove').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.getAttribute('data-index'));
        this.selectedTags.splice(idx, 1);
        this.renderActiveTags();
        this.updateSuggestions();
        this.updateResults();
      });
    });
  }

  updateResults() {
    const query = this.searchInput.value.toLowerCase().trim();
    const land = this.filterLand.value;
    const gebied = this.filterGebied.value;
    const type = this.filterType.value;

    this.filteredItems = this.allItems.filter(item => {
      // Text search (vrije tekst in invoerveld)
      if (query) {
        const matches = [item.naam, item.land, item.regio, item.gebied]
          .filter(Boolean)
          .some(field => field.toLowerCase().includes(query));
        if (!matches) return false;
      }

      // Tag-chips filter (AND-logica: alle tags moeten matchen)
      for (const tag of this.selectedTags) {
        if (tag.type === 'naam' && item.naam !== tag.value) return false;
        if (tag.type === 'type' && item.type !== tag.value) return false;
        if (tag.type === 'land' && item.land !== tag.value) return false;
        if (tag.type === 'regio' && item.regio !== tag.value) return false;
        if (tag.type === 'gebied' && (item.gebied || item.regio) !== tag.value) return false;
      }

      // Dropdown-filters (legacy)
      if (land && item.land !== land) return false;
      if (gebied && (item.gebied || item.regio) !== gebied) return false;
      if (type && item.type !== type) return false;

      return true;
    });

    this.render();
  }

  render() {
    // Header
    this.resultsHeader.textContent =
      this.filteredItems.length === 0
        ? 'Geen resultaten gevonden'
        : `${this.filteredItems.length} resultaat${this.filteredItems.length !== 1 ? 'en' : ''} gevonden`;

    // Results
    const typeLabels = {
      'camping': 'Camping',
      'fietstocht': 'Fietstocht',
      'wandelroute': 'Wandelroute',
      'kano-sup': 'Kano & SUP',
      'plaats': 'Plaats',
      'museum': 'Museum'
    };

    const html = this.filteredItems.map(item => {
      const location = [item.plaats, item.regio].filter(Boolean).join(', ');
      return `
      <a href="${item.url}" class="result-card">
        ${item.foto ? `<img src="${item.foto}" alt="${item.naam}" class="result-card__image" loading="lazy">` : ''}
        <div class="result-card__content">
          <div class="result-card__type">${typeLabels[item.type] || item.type}</div>
          <div class="result-card__title">${item.naam}</div>
          <div class="result-card__location">${location}</div>
        </div>
      </a>
    `;
    }).join('');

    this.resultsContainer.innerHTML = html;
  }

  reset() {
    this.searchInput.value = '';
    this.selectedTags = [];
    this.filterLand.value = '';
    this.filterGebied.value = '';
    this.filterType.value = '';
    this.renderActiveTags();
    this.updateGebieden();
    this.updateResults();
  }
}

// Initialize when page is loaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    new FilteredSearch();
  });
} else {
  new FilteredSearch();
}
</script>
